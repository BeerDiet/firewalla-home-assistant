name: HACS Validation

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  hacs:
    name: HACS Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run HACS validation
        uses: hacs/action@main
        with:
          category: integration
          ignore: images
