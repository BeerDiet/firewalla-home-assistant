name: Release

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: "Version bump to apply"
        required: false
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Compute next version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          BUMP_TYPE="${{ github.event.inputs.bump_type || 'patch' }}"
          CURRENT_TAG="$(git tag --sort=-v:refname | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | head -n1 || true)"
          if [ -z "$CURRENT_TAG" ]; then
            CURRENT_TAG="0.0.0"
          fi
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_TAG"
          case "$BUMP_TYPE" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
            *)
              echo "Unsupported bump_type: $BUMP_TYPE" >&2
              exit 1
              ;;
          esac
          NEXT_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "current_version=$CURRENT_TAG" >> "$GITHUB_OUTPUT"
          echo "next_version=$NEXT_VERSION" >> "$GITHUB_OUTPUT"

      - name: Update manifest version
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          manifest_path = Path("custom_components/firewalla/manifest.json")
          data = json.loads(manifest_path.read_text(encoding="utf-8"))
          data["version"] = "${{ steps.version.outputs.next_version }}"
          manifest_path.write_text(json.dumps(data, indent=2) + "\n", encoding="utf-8")
          PY

      - name: Commit release version
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add custom_components/firewalla/manifest.json
          git commit -m "Release ${{ steps.version.outputs.next_version }}"
          git tag "${{ steps.version.outputs.next_version }}"
          git push origin HEAD
          git push origin "${{ steps.version.outputs.next_version }}"

      - name: Create release archive
        run: |
          mkdir -p dist
          zip -r "dist/firewalla-${{ steps.version.outputs.next_version }}.zip" custom_components README.md LICENSE hacs.json

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.next_version }}
          name: ${{ steps.version.outputs.next_version }}
          generate_release_notes: true
          files: dist/firewalla-${{ steps.version.outputs.next_version }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
