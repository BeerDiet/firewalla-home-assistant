title: Firewalla
views:
  - title: Traffic
    path: traffic
    icon: mdi:speedometer
    cards:
      - type: markdown
        content: >
          This example uses aggregate Internet sensors so it works across
          global, group, and box scopes. Add per-network cards only when your
          scope publishes wired, wireless, or WireGuard sensors.
      - type: custom:mini-graph-card
        name: Internet Traffic
        hours_to_show: 6
        points_per_hour: 12
        line_width: 2
        lower_bound: 0
        smoothing: false
        show:
          state: true
          legend: true
          fill: false
        entities:
          - entity: sensor.firewalla_download_mbps
            name: Download
            color: "#00acc1"
          - entity: sensor.firewalla_upload_mbps
            name: Upload
            color: "#fb8c00"
      - type: entities
        title: Throughput
        entities:
          - entity: sensor.firewalla_download_mbps
          - entity: sensor.firewalla_upload_mbps
      - type: entities
        title: Transfer Volume
        entities:
          - entity: sensor.firewalla_download_last_5m
            name: Download Recent Volume
          - entity: sensor.firewalla_upload_last_5m
            name: Upload Recent Volume
      - type: entities
        title: Activity
        entities:
          - entity: sensor.firewalla_flows
          - entity: sensor.firewalla_alarms
          - entity: sensor.firewalla_rules
            name: Rule Activity
          - entity: sensor.firewalla_current_rules
          - entity: sensor.firewalla_online_boxes
          - entity: sensor.firewalla_offline_boxes
