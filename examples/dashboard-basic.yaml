title: Firewalla
views:
  - title: Overview
    path: overview
    icon: mdi:shield-home
    type: sections
    max_columns: 3
    sections:
      - title: Activity
        cards:
          - type: grid
            columns: 2
            square: false
            cards:
              - type: tile
                entity: sensor.firewalla_flows
                name: Blocked Flows
              - type: tile
                entity: sensor.firewalla_alarms
                name: Alarm Activity
              - type: tile
                entity: sensor.firewalla_rules
                name: Rule Activity
              - type: tile
                entity: sensor.firewalla_current_rules
                name: Current Rules
              - type: tile
                entity: sensor.firewalla_online_boxes
                name: Online Boxes
              - type: tile
                entity: sensor.firewalla_offline_boxes
                name: Offline Boxes
      - title: Throughput
        cards:
          - type: grid
            columns: 2
            square: false
            cards:
              - type: tile
                entity: sensor.firewalla_download_mbps
                name: Internet Download
              - type: tile
                entity: sensor.firewalla_upload_mbps
                name: Internet Upload
              - type: tile
                entity: sensor.firewalla_download_last_5m
                name: Download Recent Volume
              - type: tile
                entity: sensor.firewalla_upload_last_5m
                name: Upload Recent Volume
          - type: history-graph
            title: Internet Throughput
            hours_to_show: 6
            entities:
              - entity: sensor.firewalla_download_mbps
                name: Download
              - entity: sensor.firewalla_upload_mbps
                name: Upload
      - title: Top Stats
        cards:
          - type: entities
            title: Top Stats
            entities:
              - entity: sensor.firewalla_top_box_blocked_flows
              - entity: sensor.firewalla_top_box_security_alarms
              - entity: sensor.firewalla_top_region_blocked_flows
      - title: Optional Per-Network Sensors
        cards:
          - type: markdown
            content: >
              Add wired, wireless, or WireGuard cards only if your configured
              Firewalla scope exposes those sensors.
