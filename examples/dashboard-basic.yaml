title: Firewalla
views:
  - title: Overview
    path: overview
    icon: mdi:shield-home
    type: sections
    max_columns: 3
    sections:
      - title: Activity
        cards:
          - type: grid
            columns: 2
            square: false
            cards:
              - type: tile
                entity: sensor.firewalla_flows
                name: Blocked Flows
              - type: tile
                entity: sensor.firewalla_alarms
                name: Alarm Activity
              - type: tile
                entity: sensor.firewalla_rules
                name: Rule Activity
              - type: tile
                entity: sensor.firewalla_current_rules
                name: Current Rules
              - type: tile
                entity: sensor.firewalla_online_boxes
                name: Online Boxes
              - type: tile
                entity: sensor.firewalla_offline_boxes
                name: Offline Boxes
      - title: Throughput
        cards:
          - type: grid
            columns: 2
            square: false
            cards:
              - type: tile
                entity: sensor.firewalla_download_mbps
                name: Internet Download
              - type: tile
                entity: sensor.firewalla_upload_mbps
                name: Internet Upload
              - type: tile
                entity: sensor.firewalla_download_last_5m
                name: Download Recent Volume
              - type: tile
                entity: sensor.firewalla_upload_last_5m
                name: Upload Recent Volume
          - type: history-graph
            title: Internet Throughput
            hours_to_show: 6
            entities:
              - entity: sensor.firewalla_download_mbps
                name: Download
              - entity: sensor.firewalla_upload_mbps
                name: Upload
      - title: Top Stats
        cards:
          - type: entities
            title: Top Stats
            entities:
              - entity: sensor.firewalla_top_box_blocked_flows
              - entity: sensor.firewalla_top_box_security_alarms
              - entity: sensor.firewalla_top_region_blocked_flows
              - entity: sensor.firewalla_branch_box_top_talkers
                name: Branch Box Top Talkers
          - type: markdown
            title: Top Downloaders
            content: >
              {% set items =
              state_attr('sensor.firewalla_branch_box_top_talkers',
              'download_ranked_devices') or [] %}
              {% if items %}
              {% for item in items %}
              {{ item.rank }}. **{{ item.device_name or item.device_id }}**
              - {{ ((item.bytes | int(0)) / 1000000000) | round(2) }} GB
              on {{ item.network_name or 'Unknown network' }}
              {% endfor %}
              {% else %}
              No ranked download activity is available for this box.
              {% endif %}
          - type: markdown
            title: Top Uploaders
            content: >
              {% set items =
              state_attr('sensor.firewalla_branch_box_top_talkers',
              'upload_ranked_devices') or [] %}
              {% if items %}
              {% for item in items %}
              {{ item.rank }}. **{{ item.device_name or item.device_id }}**
              - {{ ((item.bytes | int(0)) / 1000000000) | round(2) }} GB
              on {{ item.network_name or 'Unknown network' }}
              {% endfor %}
              {% else %}
              No ranked upload activity is available for this box.
              {% endif %}
      - title: Dynamic Entities
        cards:
          - type: markdown
            content: >
              Top-talker sensors and internet-block switches are created
              dynamically under each Firewalla box. Replace the sample entity
              IDs below with the ones from your own Home Assistant instance.
          - type: entities
            title: Sample Device Controls
            entities:
              - entity: switch.firewalla_gid_1_dev_1_internet_block
                name: Laptop Internet Block
              - entity: switch.firewalla_gid_1_net_1_internet_block
                name: Main LAN Internet Block
      - title: Optional Per-Network Sensors
        cards:
          - type: markdown
            content: >
              Add wired, wireless, or WireGuard cards only if your configured
              Firewalla scope exposes those sensors.
