[tool.ruff]
line-length = 88
target-version = "py313"

[tool.ruff.lint]
select = [
  "E",
  "F",
  "I",
  "UP"
]
ignore = [
  "E501",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
addopts = [
  "--strict-markers",
  "--disable-warnings",
]

[tool.coverage.run]
source = ["custom_components.firewalla"]

[tool.coverage.report]
show_missing = true
skip_covered = false
